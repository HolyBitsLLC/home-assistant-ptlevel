name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ github.event_name == 'push' && fromJSON('["self-hosted", "linux", "x64", "krubecible", "holybits-shared"]') || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ${{ github.event_name == 'push' && fromJSON('["self-hosted", "linux", "x64", "krubecible", "holybits-shared"]') || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install pytest pytest-cov homeassistant
      - run: pytest --cov=custom_components/ptlevel --cov-report=xml -v || echo "No tests yet"
      - uses: codecov/codecov-action@13bc40b3764cf0988e1d17b22c097653982b0dbe # v4.6.0
        if: always()

  validate:
    runs-on: ${{ github.event_name == 'push' && fromJSON('["self-hosted", "linux", "x64", "krubecible", "holybits-shared"]') || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Validate manifest
        run: python -c "import json; json.load(open('custom_components/ptlevel/manifest.json'))"
      - name: Validate strings
        run: python -c "import json; json.load(open('custom_components/ptlevel/strings.json'))"
      - name: Validate translations
        run: python -c "import json; json.load(open('custom_components/ptlevel/translations/en.json'))"

  hassfest:
    runs-on: ${{ github.event_name == 'push' && fromJSON('["self-hosted", "linux", "x64", "krubecible", "holybits-shared"]') || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ${{ github.event_name == 'push' && fromJSON('["self-hosted", "linux", "x64", "krubecible", "holybits-shared"]') || 'ubuntu-latest' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands
