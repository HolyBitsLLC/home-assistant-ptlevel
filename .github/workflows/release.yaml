name: Release
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: [self-hosted, linux, x64, krubecible, holybits-shared]
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56e235 # v4.1.3
        id: release
        with:
          release-type: python
          token: ${{ secrets.GITHUB_TOKEN }}

  build-asset:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: [self-hosted, linux, x64, krubecible, holybits-shared]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create HACS zip asset
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          ASSET="ptlevel_v${VERSION}.zip"
          cd custom_components/ptlevel
          zip -r "../../../$ASSET" .
          cd ../../..
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "Asset created: $ASSET"
        id: zip

      - name: Upload release asset
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ steps.zip.outputs.asset }}

  sync-manifest:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: [self-hosted, linux, x64, krubecible, holybits-shared]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json version
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          python3 -c "
          import json, pathlib
          p = pathlib.Path('custom_components/ptlevel/manifest.json')
          m = json.loads(p.read_text())
          m['version'] = '${VERSION}'
          p.write_text(json.dumps(m, indent=2) + '\n')
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/ptlevel/manifest.json
          git diff --cached --quiet || git commit -m "chore: sync manifest.json to v${VERSION}"
          git push
